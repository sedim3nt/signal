name: Daily Signal Ingest

on:
  schedule:
    - cron: "15 9 * * *"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: python -m pip install --upgrade yt-dlp

      - run: npm ci

      - run: npm run ingest:daily
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}

      - run: npm run synthesize
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}

      - run: npm run db:build

      - run: npm run build

      - name: Commit generated signal payload
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update daily signal payload"
          file_pattern: public/data/signal.json public/data/signal-db.json public/data/signal.sqlite data/signal.sqlite
